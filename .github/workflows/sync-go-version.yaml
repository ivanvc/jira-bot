name: Sync go.mod with Dockerfile Go version

on:
  pull_request:
    paths:
      - "Dockerfile"

jobs:
  sync:
    if: startsWith(github.head_ref, 'dependabot/docker/golang-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Go version from Dockerfile
        id: extract
        run: |
          # Parse the golang image tag from Dockerfile (e.g., golang:1.26.4@sha256:...)
          RAW=$(grep -oP 'golang:\K[0-9]+\.[0-9]+\.[0-9]+' Dockerfile | head -1)
          echo "full=${RAW}" >> "$GITHUB_OUTPUT"
          # Extract major.minor (e.g., 1.26)
          MINOR=$(echo "$RAW" | grep -oP '^[0-9]+\.[0-9]+')
          echo "minor=${MINOR}" >> "$GITHUB_OUTPUT"
          echo "Detected Go version: ${RAW} (minor: ${MINOR})"

      - name: Update go.mod
        run: |
          FULL="${{ steps.extract.outputs.full }}"
          MINOR="${{ steps.extract.outputs.minor }}"
          CURRENT_GO=$(grep -oP '^go \K[0-9]+\.[0-9]+' go.mod)

          echo "Dockerfile Go: ${FULL}"
          echo "go.mod go directive: ${CURRENT_GO}"

          # Always update toolchain to match the full patch version
          sed -i "s/^toolchain go.*/toolchain go${FULL}/" go.mod

          # If minor version changed, update the go directive too
          if [ "${CURRENT_GO}" != "${MINOR}" ]; then
            echo "Minor version bump detected: ${CURRENT_GO} -> ${MINOR}"
            sed -i "s/^go ${CURRENT_GO}/go ${MINOR}/" go.mod
          fi

          cat go.mod | head -6

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add go.mod
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "deps: sync go.mod with Dockerfile Go version"
            git push
          fi
