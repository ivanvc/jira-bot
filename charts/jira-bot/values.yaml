# Default values for jira-bot.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

config:
  # Optional: listen http
  listenHTTP: ""
  # Optional: log level
  logLevel: ""
  # Required: Base URL where the bot is publicly accessible (no trailing slash)
  # e.g., https://jira-bot.example.com
  callbackURL: ""
  # K8s Secret name for storing per-user OAuth tokens (defaults to {{ fullname }}-user-tokens)
  tokenSecretName: ""
  # Interval for checking tokens needing refresh (default: 30s, min: 10s, max: 300s)
  refreshCheckInterval: "30s"
  jira:
    # Required: Default project
    defaultProject: ""
    # Required: Default issue type
    defaultIssueType: ""
    # Optional: Auto-assign created issues to the user who triggered the command (default: false)
    defaultAssign: false
    # Required: Atlassian Cloud ID for the target Jira site
    cloudID: ""
    # Optional: Update GitHub issue/PR title with Jira key (prepend/append/none, default: disabled)
    updateTitle: ""
  github:
    # Required: The GitHub App ID
    appID: ""
    # Required: The GitHub App's OAuth Client ID (from the app's settings page, e.g. Iv23liXXXXXX)
    clientID: ""
    # Post-OAuth redirect settings
    redirect:
      # Optional: Base URL prepended to stored path (default: https://github.com, set for GitHub Enterprise)
      baseURL: ""
      # Optional: Seconds before auto-redirect on success page (default: 3)
      delaySecs: ""
  namespace: ""

secrets:
  github:
    # Required: GitHub webhook secret
    webhookSecret: ""
    # Required: GitHub app private key in Base64
    privateKeyBase64: ""
    # Required: GitHub App client secret (for user-to-server OAuth identity verification)
    appClientSecret: ""
  jira:
    # Required: Atlassian OAuth 2.0 client ID
    clientID: ""
    # Required: Atlassian OAuth 2.0 client secret
    clientSecret: ""

# Leader election configuration for multi-user token refresh
leaderElection:
  leaseName: ""    # defaults to {{ fullname }}-leader
  leaseDuration: "15s"
  leaseRenewDeadline: "10s"

image:
  repository: ivan/jira-bot
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: jira-bot.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# RBAC configuration for the bot's Kubernetes permissions
rbac:
  create: true

# ServiceAccount configuration
serviceAccount:
  create: true
  name: ""  # defaults to {{ fullname }}
