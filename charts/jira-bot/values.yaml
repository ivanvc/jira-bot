# Default values for jira-bot.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

config:
  # Optional: listen http
  listenHTTP: ""
  # Optional: log level
  logLevel: ""
  # Optional: OAuth callback URL (only needed during initial setup)
  oauthCallbackURL: ""
  jira:
    # OAuth 2.0: Jira Cloud ID (required for OAuth mode)
    cloudID: ""
    # Legacy: Jira Base URL (required for basic auth mode)
    baseURL: ""
    # Legacy: Jira username (required for basic auth mode)
    username: ""
    # Required: Default project
    defaultProject: ""
    # Required: Default issue type
    defaultIssueType: ""
  # Required: The GitHub App ID
  githubAppID: ""
  namespace: ""

secrets:
  github:
    # Required: GitHub webhook secret
    webhookSecret: ""
    # Required: GitHub app private key in Base64
    privateKeyBase64: ""
  jira:
    # OAuth 2.0 credentials (required for OAuth mode)
    clientID: ""
    clientSecret: ""
    refreshToken: ""
    # Legacy PAT credential (required for basic auth mode)
    token: ""

image:
  repository: ivan/jira-bot
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: jira-bot.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Token persistence configuration for OAuth token storage in Kubernetes
tokenPersistence:
  enabled: true
  secretName: ""   # defaults to {{ fullname }}-oauth-token
  leaseName: ""    # defaults to {{ fullname }}-token-leader
  pollInterval: "30s"
  leaseDuration: "15s"
  leaseRenewDeadline: "10s"

# RBAC configuration for the bot's Kubernetes permissions
rbac:
  create: true

# ServiceAccount configuration
serviceAccount:
  create: true
  name: ""  # defaults to {{ fullname }}
