apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jira-bot.fullname" . }}
  labels:
    {{- include "jira-bot.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "jira-bot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "jira-bot.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "jira-bot.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.tokenPersistence.enabled }}
            - name: JIRA_BOT_TOKEN_SECRET_NAME
              value: {{ default (printf "%s-oauth-token" (include "jira-bot.fullname" .)) .Values.tokenPersistence.secretName | quote }}
            - name: JIRA_BOT_TOKEN_LEASE_NAME
              value: {{ default (printf "%s-token-leader" (include "jira-bot.fullname" .)) .Values.tokenPersistence.leaseName | quote }}
            {{- if .Values.tokenPersistence.pollInterval }}
            - name: JIRA_BOT_TOKEN_POLL_INTERVAL
              value: {{ .Values.tokenPersistence.pollInterval | quote }}
            {{- end }}
            {{- if .Values.tokenPersistence.leaseDuration }}
            - name: JIRA_BOT_LEASE_DURATION
              value: {{ .Values.tokenPersistence.leaseDuration | quote }}
            {{- end }}
            {{- if .Values.tokenPersistence.leaseRenewDeadline }}
            - name: JIRA_BOT_LEASE_RENEW_DEADLINE
              value: {{ .Values.tokenPersistence.leaseRenewDeadline | quote }}
            {{- end }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "jira-bot.fullname" . }}-config
            - secretRef:
                name: {{ include "jira-bot.fullname" . }}-secrets
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
