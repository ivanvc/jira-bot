apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jira-bot.fullname" . }}-config
  labels:
    {{- include "jira-bot.labels" . | nindent 4 }}
data:
  JIRA_BOT_JIRA_DEFAULT_PROJECT: {{ .Values.config.jira.defaultProject }}
  JIRA_BOT_JIRA_DEFAULT_ISSUE_TYPE: {{ .Values.config.jira.defaultIssueType }}
  JIRA_BOT_GITHUB_APP_ID: {{ .Values.config.github.appID | quote }}
  {{- if .Values.config.github.clientID }}
  JIRA_BOT_GITHUB_APP_CLIENT_ID: {{ .Values.config.github.clientID }}
  {{- end }}
  {{- if .Values.config.jira.defaultAssign }}
  JIRA_BOT_DEFAULT_ASSIGN: {{ .Values.config.jira.defaultAssign | quote }}
  {{- end }}
  {{- if .Values.config.jira.cloudID }}
  JIRA_BOT_CLOUD_ID: {{ .Values.config.jira.cloudID }}
  {{- end }}
  {{- if .Values.config.callbackURL }}
  JIRA_BOT_USER_AUTH_CALLBACK_URL: {{ .Values.config.callbackURL }}
  {{- end }}
  {{- if .Values.config.refreshCheckInterval }}
  JIRA_BOT_REFRESH_CHECK_INTERVAL: {{ .Values.config.refreshCheckInterval }}
  {{- end }}
  {{- if .Values.config.logLevel }}
  JIRA_BOT_LOG_LEVEL: {{ .Values.config.logLevel }}
  {{- end }}
  {{- if .Values.config.listenHTTP }}
  JIRA_BOT_LISTEN_HTTP: {{ .Values.config.listenHTTP }}
  {{- end }}
