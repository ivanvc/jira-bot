apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jira-bot.fullname" . }}-config
  labels:
    {{- include "jira-bot.labels" . | nindent 4 }}
data:
  JIRA_BOT_JIRA_DEFAULT_PROJECT: {{ .Values.config.jira.defaultProject }}
  JIRA_BOT_JIRA_DEFAULT_ISSUE_TYPE: {{ .Values.config.jira.defaultIssueType }}
  JIRA_BOT_GITHUB_APP_ID: {{ .Values.config.githubAppID | quote }}
  {{- if .Values.config.jira.defaultAssign }}
  JIRA_BOT_DEFAULT_ASSIGN: {{ .Values.config.jira.defaultAssign | quote }}
  {{- end }}
  {{- if .Values.config.globalCloudID }}
  JIRA_BOT_GLOBAL_CLOUD_ID: {{ .Values.config.globalCloudID }}
  {{- end }}
  {{- if .Values.perUserTokens.callbackURL }}
  JIRA_BOT_USER_AUTH_CALLBACK_URL: {{ .Values.perUserTokens.callbackURL }}
  {{- end }}
  {{- if .Values.perUserTokens.refreshCheckInterval }}
  JIRA_BOT_REFRESH_CHECK_INTERVAL: {{ .Values.perUserTokens.refreshCheckInterval }}
  {{- end }}
  {{- if .Values.config.logLevel }}
  JIRA_BOT_LOG_LEVEL: {{ .Values.config.logLevel }}
  {{- end }}
  {{- if .Values.config.listenHTTP }}
  JIRA_BOT_LISTEN_HTTP: {{ .Values.config.listenHTTP }}
  {{- end }}
